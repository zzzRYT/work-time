"""출석 상태"""
enum AttendanceStatus {
  """미출석"""
  NOT_ATTENDED

  """학습 중"""
  STUDYING

  """학습 완료"""
  COMPLETED

  """지각"""
  LATE

  """휴가"""
  VACATION
}

"""랭킹 기간"""
enum RankingPeriod {
  """주간"""
  WEEKLY

  """월간"""
  MONTHLY
}

type Query {
  _empty: String

  """전체 멤버 목록 조회"""
  members: [Member!]!

  """오늘의 출석 요약"""
  todayAttendanceSummary: AttendanceSummary!

  """특정 멤버의 특정 날짜 상세 조회"""
  dayDetail(memberId: ID!, date: String!): DayDetailResult!

  """특정 멤버의 월간 캘린더"""
  calendar(memberId: ID!, year: Int!, month: Int!): [CalendarDay!]!

  """특정 멤버의 월간 요약"""
  monthlySummary(memberId: ID!, year: Int!, month: Int!): MonthlySummaryResult!

  """월별 회비 상태 조회"""
  feeStatus(month: String!): [FeeStatusEntry!]!

  """멤버 랭킹 (주간/월간)"""
  memberRanking(period: RankingPeriod!): [RankingEntry!]!
}

type Mutation {
  _empty: String

  """체크인 (지각 자동 감지)"""
  checkIn(memberId: ID!): Session!

  """체크아웃"""
  checkOut(memberId: ID!): Session!

  """휴가 사용 등록"""
  useVacation(memberId: ID!, date: String!, hours: Int!): DailyVacation!

  """회비 납부 상태 토글"""
  toggleFeePayment(memberId: ID!, month: String!): MonthlyFee!
}

"""스터디 멤버"""
type Member {
  id: ID!

  """실명"""
  name: String!

  """표시 이름"""
  displayName: String!

  """프로필 색상 (hex)"""
  color: String!

  """오늘의 출석 상태"""
  currentStatus: AttendanceStatus!

  """오늘 총 학습 시간(분)"""
  todayStudyMinutes: Int!
}

"""출석 세션 (체크인~체크아웃)"""
type Session {
  id: ID!
  memberId: ID!

  """날짜 (YYYY-MM-DD)"""
  date: String!

  """체크인 시각 (ISO 8601)"""
  checkInTime: String!

  """체크아웃 시각 (ISO 8601, 학습 중이면 null)"""
  checkOutTime: String

  """지각 여부"""
  isLate: Boolean!

  """학습 시간(분), 체크아웃 전이면 현재까지 경과 시간"""
  durationMinutes: Int
}

"""출석 요약 통계"""
type AttendanceSummary {
  """전체 멤버 수"""
  total: Int!

  """출석한 멤버 수"""
  attended: Int!

  """현재 학습 중인 멤버 수"""
  studying: Int!

  """지각한 멤버 수"""
  late: Int!
}

"""특정 날짜의 상세 출석 정보"""
type DayDetailResult {
  sessions: [Session!]!

  """총 학습 시간(분)"""
  totalDurationMinutes: Int!

  """휴가 사용 시간"""
  vacationHours: Int
}

"""캘린더 날짜별 출석 상태"""
type CalendarDay {
  """날짜 (YYYY-MM-DD)"""
  date: String!

  """해당 날짜의 출석 상태"""
  status: AttendanceStatus!
}

"""월간 요약 통계"""
type MonthlySummaryResult {
  """출석 일수"""
  attendanceDays: Int!

  """총 학습 시간(분)"""
  totalStudyMinutes: Int!

  """일 평균 학습 시간(분)"""
  averageDailyMinutes: Int!

  """지각 횟수"""
  lateCount: Int!

  """휴가 일수"""
  vacationDays: Int!

  """총 지각 벌금(원)"""
  totalLateFee: Int!
}

"""일일 휴가 기록"""
type DailyVacation {
  id: ID!
  memberId: ID!

  """날짜 (YYYY-MM-DD)"""
  date: String!

  """휴가 시간 (2, 4, 6, 8시간 단위)"""
  hours: Int!
}

"""월별 회비 납부 기록"""
type MonthlyFee {
  id: ID!
  memberId: ID!

  """월 (YYYY-MM)"""
  month: String!

  """납부 여부"""
  isPaid: Boolean!
}

"""회비 상태 항목"""
type FeeStatusEntry {
  member: Member!

  """지각 벌금(원)"""
  lateFee: Int!

  """월 회비(원)"""
  monthlyFee: Int!

  """납부 여부"""
  isPaid: Boolean!

  """지각 횟수"""
  lateCount: Int!
}

"""랭킹 항목"""
type RankingEntry {
  member: Member!

  """총 학습 시간(분)"""
  totalStudyMinutes: Int!

  """출석 일수"""
  attendanceDays: Int!

  """지각 횟수"""
  lateCount: Int!
}