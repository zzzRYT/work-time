name: 기능 요청
description: 새 기능이나 개선 사항을 제안할 때
labels: ["type: feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하고 싶은 문제
      description: 어떤 불편함이나 필요를 느꼈나요?
      placeholder: "~할 때 ~해서 불편하다"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결책
      description: 어떻게 해결하면 좋을 것 같나요?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 관련 영역
      options:
        - app
        - server
        - 공통
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안 (선택)
      description: 고려해본 다른 방법이 있다면 적어주세요.
